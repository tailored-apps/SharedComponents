# Project information
site_name: "Tailored Apps. .NET Shared Components"
site_description: "Reusable components for webapps"
site_author: "Tailored Apps."
site_url: "https://shared.tailoredapps.pl/en/"

# Copyright
copyright: "&copy; 2022 Tailored Apps"

# Repository
repo_name: "SharedComponents"
repo_url: "https://github.com/tailored-apps/SharedComponents"
edit_uri: "https://github.com/tailored-apps/SharedComponents/edit/master/docs-en"

# Directories
docs_dir: "docs-en"
site_dir: "site/en"
extra_css:
  - stylesheets/extra.css

# Navigation
nav:
  - Home: index.md
  - Libraries:
      - DateTime: Libraries/DateTime/index.md
      - Email:
          - Overview: Libraries/Email/index.md
          - Models: Libraries/Email/Models.md
          - Office365: Libraries/Email/Office365.md
      - EntityFramework:
          - Overview: Libraries/EntityFramework/index.md
          - UnitOfWork.WebApiCore: Libraries/EntityFramework/UnitOfWork.WebApiCore.md
      - ExceptionHandling: Libraries/ExceptionHandling/index.md
      - MediatR:
          - Overview: Libraries/MediatR/index.md
          - Caching: Libraries/MediatR/Caching.md
          - Email: Libraries/MediatR/Email.md
          - ML: Libraries/MediatR/ML.md
          - PagedRequest: Libraries/MediatR/PagedRequest.md
      - Payments:
          - Overview: Libraries/Payments/index.md
          - Providers:
              - Adyen: Libraries/Payments/Providers/Adyen.md
              - CashBill: Libraries/Payments/Providers/CashBill.md
              - HotPay: Libraries/Payments/Providers/HotPay.md
              - PayNow: Libraries/Payments/Providers/PayNow.md
              - PayU: Libraries/Payments/Providers/PayU.md
              - Przelewy24: Libraries/Payments/Providers/Przelewy24.md
              - Revolut: Libraries/Payments/Providers/Revolut.md
              - Stripe: Libraries/Payments/Providers/Stripe.md
              - Tpay: Libraries/Payments/Providers/Tpay.md
      - Querying: Libraries/Querying/index.md
  - Contributing: contributing.md

# Configuration
theme:
  name: material
  language: en
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  icon:
    logo: logo

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

# Customization
extra:
  annotate:
    json: [.s2]
  analytics:
    provider: google
    property: GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tailored-apps/SharedComponents
  alternate:
    - name: Polski
      link: /
      lang: pl
    - name: English
      link: /en/
      lang: en

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
